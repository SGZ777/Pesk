<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho - Pesk</title>
  <link rel="icon" href="imagens/icones/icon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>



<body class="body-home">
  <header class="p-3 text-bg-primary header-home">
    <div class="container d-flex align-items-center justify-content-between flex-wrap">
      <a href="home.html" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
        <img src="imagens/icones/logo.png" class="logo-header" alt="" />
      </a>

      <form id="form-buscar" class="d-flex ms-1 flex-grow-1 search" role="search" style="max-width: 500px">
        <input type="search" id="buscar" class="form-control form-control-dark text-bg-light" placeholder="Buscar" />
      </form>

      <div class="col-13">
        <a href="peskclub.html">
          <button type="button" style="background-color: #ff8b43 !important; border: none"
            class="btn btn-warning me-2 assineja">
            Assine-já<span class="estrela">✦</span>
          </button>
        </a>
      </div>

      <nav>
        <a href="/">Início</a>
        <a href="/catalogo">Catálogo</a>

        <!-- Visível apenas para usuários comuns (role = 'user') -->
        <a href="/meus-pedidos.html" id="link-meus-pedidos" style="display:none">Meus Pedidos</a>

        <!-- Visível apenas para admins (role = 'admin') -->
        <a href="/admin.html" id="link-admin" style="display:none">⚡ Painel Admin</a>

        <!-- Troque pelo seu link de carrinho existente -->
        <a href="/carrinho.html" id="link-carrinho" style="display:none">Carrinho</a>

        <!-- Botões de login/logout -->
        <a href="/login.html" id="btn-login">Entrar</a>
        <button id="btn-logout" style="display:none" onclick="logout()">Sair</button>
      </nav>
    </div>
  </header>
  <script>
    // Cole este script no final do <body> de cada página que tem o header
    (function ajustarHeader() {
      const token = localStorage.getItem('token')
      const role = localStorage.getItem('role')

      if (!token) return // não logado: mostra apenas "Entrar" (padrão)

      // Está logado: esconde botão de login, mostra sair
      const elLogin = document.getElementById('btn-login')
      const elLogout = document.getElementById('btn-logout')
      if (elLogin) elLogin.style.display = 'none'
      if (elLogout) elLogout.style.display = 'inline-block'

      if (role === 'admin') {
        // Admin: mostra link do painel, esconde carrinho e meus pedidos
        const el = document.getElementById('link-admin')
        if (el) el.style.display = 'inline-block'

      } else if (role === 'user') {
        // Usuário comum: mostra carrinho e meus pedidos
        const elPedidos = document.getElementById('link-meus-pedidos')
        const elCarrinho = document.getElementById('link-carrinho')
        if (elPedidos) elPedidos.style.display = 'inline-block'
        if (elCarrinho) elCarrinho.style.display = 'inline-block'
      }
    })()

    function logout() {
      localStorage.clear()
      window.location.href = '/login.html'
    }
  </script>
  <div class="container my-5 produtos-carrinhos">
    <h2 class="mb-4 fw-bold">Seu Carrinho</h2>
    <div class="row gy-3" id="lista-produtos"></div>
  </div>

  <script>
    const API = "http://localhost:3000/carrinho";
    const token = localStorage.getItem("token");

    async function carregarCarrinho() {
      const lista = document.getElementById("lista-produtos");
      lista.innerHTML = "<p>Carregando...</p>";

      const res = await fetch(API, {
        headers: { Authorization: "Bearer " + token },
      });
      if (!res.ok)
        return (lista.innerHTML = "<p>Não há nenhum item no carrinho.</p>");

      const produtos = await res.json();
      lista.innerHTML = "";

      if (!produtos || produtos.length === 0) {
        lista.innerHTML = `
                    <div class="text-center my-5" style="justify-self:center;">
                        <img src="imagens/icones/icon-carrinho.png" alt="Carrinho vazio" width="100" class="mb-3 opacity-75">
                        <h4 class="fw-bold">Seu carrinho está vazio</h4>
                        <p class="text-muted">Adicione produtos para começar suas compras!</p>
                        <a href="home.html" class="btn btn-primary mt-3">Voltar à Loja</a>
                    </div>
                `;
        return;
      }

      let subtotal = 0;

      produtos.forEach((p) => {
        subtotal += p.preco * p.quantidade;
        const card = document.createElement("div");
        card.className = "col-12 col-md-8";
        card.innerHTML = `<div class="card p-3 shadow-sm d-flex flex-row align-items-center justify-content-between">
                    <div class="d-flex align-items-center">
                        <img src="/imagens/produtos/${p.imagens[0]}" alt="${p.nome}" class="img-fluid rounded me-3" style="width:80px;height:80px;">
                        <div>
                            <h6 class="fw-bold mb-1">${p.nome}</h6>
                            <p class="text-muted mb-1">${p.descricao || ""}</p>
                            <p class="text-primary fw-bold mb-0">R$ ${p.preco.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-center">
                        <button class="btn btn-outline-secondary btn-sm" onclick="alterarQtd(${p.id}, ${p.quantidade - 1})">-</button>
                        <span class="mx-2" style="font-size:17px;">${p.quantidade}</span>
                        <button class="btn btn-outline-secondary btn-sm" onclick="alterarQtd(${p.id}, ${p.quantidade + 1})">+</button>
                        <button class="btn btn-link text-danger ms-3" onclick="remover(${p.id})">Remover</button>
                    </div>
                </div>`;
        lista.appendChild(card);
      });

      // Resumo
      const resumo = document.createElement("div");
      resumo.className = "col-12 col-md-4";
      resumo.innerHTML = `
            <div class="card p-3 shadow-sm">
                <h5 class="fw-bold">Resumo</h5>
                <hr>
                <p class="d-flex justify-content-between mb-2"><span>Subtotal</span><span>R$ ${subtotal.toFixed(2)}</span></p>
                <p class="d-flex justify-content-between mb-1"><span>Frete</span><span>R$ 19,90</span></p>
                <hr>
                <p class="d-flex justify-content-between fw-bold fs-5"><span>Total</span><span>R$ ${(subtotal + 19.9).toFixed(2)}</span></p>
                <button class="btn btn-warning w-100 fw-bold mt-2">Finalizar Compra</button>
            </div>`;
      lista.appendChild(resumo);
    }

    async function alterarQtd(produtoId, novaQtd) {
      if (novaQtd < 0) return;
      await fetch(API + "/alterar-quantidade", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token,
        },
        body: JSON.stringify({ produtoId, quantidade: novaQtd }),
      });
      carregarCarrinho();
    }
    async function remover(produtoId) {
      await fetch(API + "/remover-todos", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token,
        },
        body: JSON.stringify({ produtoId }),
      });
      carregarCarrinho();
    }
    window.onload = carregarCarrinho;
  </script>
</body>
<script>
  const form = document.getElementById("form-buscar");
  const input = document.getElementById("buscar");

  // mapa de termos para páginas
  const paginas = {
    vara: "varas.html",
    varas: "varas.html",
    isca: "iscas.html",
    iscas: "iscas.html",
    carretilha: "carretilhas.html",
    carretilhas: "carretilhas.html",
    molinete: "molinetes.html",
    molinetes: "molinetes.html",
    linha: "linhas.html",
    linhas: "linhas.html",
    outro: "outros.html",
    outros: "outros.html",
  };

  form.addEventListener("submit", (e) => {
    // e=evento
    e.preventDefault(); //nn atualiza a pag
    const termo = input.value.trim().toLowerCase();

    if (paginas[termo]) {
      window.location.href = paginas[termo]; //redireciona
    } else {
      alert("Página não encontrada, verifique se escreveu certo.");
    }
  });
</script>

</html>
